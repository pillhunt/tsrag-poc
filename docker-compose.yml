services:
  incident-intent-poc:
    build: .
    container_name: incident-intent-poc
    ports:
      - "${POC_PORT:-8090}:8090"
    environment:
      OLLAMA_BASE_URL: http://tsrag-ollama:11434
      OLLAMA_MODEL: llama3.1:8b-instruct-q6_K
      OLLAMA_TIMEOUT_SEC: "1200"
      OLLAMA_NUM_CTX: "32768"
      POC_IN_DOCKER: "1"
      POC_TEMP_DIR: /app/temp
    volumes:
      - ./temp:/app/temp
      - ./static:/app/static
    networks:
      - shared-network
    restart: unless-stopped

networks:
  shared-network:
    external: true
    name: shared-network
